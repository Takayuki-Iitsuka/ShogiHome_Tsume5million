name: Test for CLI tools

permissions:
  contents: read

on:
  push:
    branches: [main, "support-*"]

jobs:
  build:
    runs-on: windows-latest
    env:
      USI_ENGINE_JSON: AppData\Roaming\electron-shogi\usi_engine.json
      USI_CSA_BRIDGE_TMP: ${{ runner.temp }}\usi-csa-bridge
    steps:
      # Setup
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          cache: "npm"
      - run: npm install -g npm@latest
      - run: npm version
      - run: npm ci --no-audit --no-fund
      - run: npm -g i tsx

      # usi-csa-bridge
      - run: npm run usi-csa-bridge:build
      - run: Move-Item -Path dist\command\usi-csa-bridge -Destination $env:USI_CSA_BRIDGE_TMP
        shell: pwsh
      - name: Install dependencies for usi-csa-bridge
        run: |
          cd $env:USI_CSA_BRIDGE_TMP
          npm i --no-audit --no-fund
        shell: pwsh
      - name: Test usi-csa-bridge
        timeout-minutes: 1
        run: $env:USI_CSA_BRIDGE_TMP\e2e\run-all
        shell: pwsh
